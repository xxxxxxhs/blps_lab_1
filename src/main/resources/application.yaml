server:
  port: ${RUNNING_PORT}

spring:
  application:
    instance-num: ${INSTANCE_NUM}
    name: lab_3
  datasource:
    url: jdbc:postgresql://db:5432/postgres
    username: postgres
    password: postgres
    host: db
    port: 5432
    dbname: postgres
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        transaction:
          jta:
            platform: org.hibernate.engine.transaction.jta.platform.internal.NarayanaJtaPlatform
  jta:
    enabled: true
    narayana:
      transaction-manager-id: ${SPRING_JTA_NARAYANA_TRANSACTION_MANAGER_ID}
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.scheduler.instanceName: lab1-scheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 10000
      org.quartz.threadPool.threadCount: 5

activemq:
  host: activemq
  stomp-port: 61613
  broker-url: tcp://activemq:61616
  queue: order.notifications

telegram:
  bot-token: 899752305:AAHnL5Z8dhLrMzkSG1HuKBk2ZvM_K4wXcK0
  chat-id: 295265787

eis:
  onlyoffice:
    base-url: http://onlyoffice
    storage-dir: /app/reports
    public-base-url: http://nginx
  reports:
    daily-cron: "0 55 23 * * ?"
    hourly-cron: "0 0 * * * ?"
    stuck-cron: "0 0/15 * * * ?"
    stuck-threshold-minutes: 30
