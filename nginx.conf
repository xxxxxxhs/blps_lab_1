events {
    worker_connections 1024;
}

http {

    upstream backend {
        server app-1:8080 max_fails=3 fail_timeout=15s;
        server app-2:8080 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }

        location /cache/ {
            proxy_pass http://onlyoffice:80/cache/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /office/ {
            proxy_pass http://onlyoffice:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_redirect http://localhost/ http://localhost/office/;
            proxy_redirect https://localhost/ https://localhost/office/;
        }
    }
}