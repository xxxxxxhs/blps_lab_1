events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types {
        application/javascript mjs;
    }

    upstream backend {
        server app-1:8080 max_fails=3 fail_timeout=15s;
        server app-2:8080 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 80;

        location = /cloud {
            return 301 /cloud/;
        }

        location ^~ /cloud/ {
            client_max_body_size 512M;

            location ~ ^/cloud/(?:build|tests|config|lib|3rdparty|templates|data)/ {
                return 404;
            }
            location ~ ^/cloud/(?:\.|autotest|occ|issue|indie|db_|console) {
                return 404;
            }

            location ~ ^/cloud(/.+?\.php)(?:/(.*))?$ {
                include fastcgi_params;
                fastcgi_param SCRIPT_FILENAME /var/www/html$1;
                fastcgi_param SCRIPT_NAME     /cloud$1;
                fastcgi_param PATH_INFO       /$2;
                fastcgi_param HTTPS off;
                fastcgi_param modHeadersAvailable true;
                fastcgi_param front_controller_active true;
                fastcgi_pass nextcloud:9000;
                fastcgi_intercept_errors on;
                fastcgi_request_buffering off;
            }

            location ~* ^/cloud/(.+\.(css|js|mjs|svg|gif|png|jpg|jpeg|webp|ico|woff2?|ttf|eot|otf|map|ogg|flac|wasm|json))$ {
                alias /var/www/html/$1;
                expires 6M;
                access_log off;
                error_page 404 = @cloud_php;
            }

            rewrite ^ /cloud/index.php last;
        }

        location @cloud_php {
            rewrite ^ /cloud/index.php last;
        }

        location /cache/ {
            proxy_pass http://onlyoffice:80/cache/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /office/ {
            proxy_pass http://onlyoffice:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_redirect http://localhost/ http://localhost/office/;
            proxy_redirect https://localhost/ https://localhost/office/;
        }

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }
}
