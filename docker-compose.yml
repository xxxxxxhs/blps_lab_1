services:

  db:
    image: postgres:15
    container_name: postgres
    volumes:
      - ./db_scripts:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres

  onlyoffice:
    image: onlyoffice/documentserver:9.3
    container_name: onlyoffice
    depends_on:
      - db
    environment:
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=onlyoffice   
      - DB_USER=office_user
      - DB_PWD=onlyoffice
      - JWT_ENABLED=false
      - JWT_SECRET=
      - JWT_HEADER=Authorization
      - USE_UNAUTHORIZED_STORAGE=true

  activemq:
    image: apache/activemq-classic:6.1.0
    container_name: activemq

  app-1:
    build: .
    container_name: app-1
    environment:
      - RUNNING_PORT=8080
      - INSTANCE_NUM=1
      - SPRING_JTA_NARAYANA_TRANSACTION_MANAGER_ID=lab1-tm-1
      - DDL_AUTO=update
    depends_on:
      - db
      - activemq
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app-2:
    build: .
    container_name: app-2
    environment:
      - RUNNING_PORT=8080
      - INSTANCE_NUM=2
      - SPRING_JTA_NARAYANA_TRANSACTION_MANAGER_ID=lab1-tm-2
      - DDL_AUTO=validate
    depends_on:
      app-1:
        condition: service_healthy
      activemq:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app-1
      - app-2
      - onlyoffice