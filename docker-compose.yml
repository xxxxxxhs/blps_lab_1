services:

  db:
    image: postgres:15
    container_name: postgres
    volumes:
      - ./db_scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres

  onlyoffice:
    image: onlyoffice/documentserver:7.5.1
    container_name: onlyoffice
    depends_on:
      - db
    environment:
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=onlyoffice   
      - DB_USER=office_user
      - DB_PWD=onlyoffice
      - JWT_ENABLED=false
      - JWT_SECRET=
      - JWT_HEADER=Authorization
      - USE_UNAUTHORIZED_STORAGE=true
      - ALLOW_PRIVATE_IP_ADDRESS=true

  activemq:
    image: apache/activemq-classic:6.1.0
    container_name: activemq

  app-1:
    build: .
    container_name: app-1
    environment:
      - RUNNING_PORT=8080
      - INSTANCE_NUM=1
      - SPRING_JTA_NARAYANA_TRANSACTION_MANAGER_ID=lab1-tm-1
      - DDL_AUTO=update
    volumes:
      - reports:/app/reports
    depends_on:
      - db
      - activemq
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app-2:
    build: .
    container_name: app-2
    environment:
      - RUNNING_PORT=8080
      - INSTANCE_NUM=2
      - SPRING_JTA_NARAYANA_TRANSACTION_MANAGER_ID=lab1-tm-2
      - DDL_AUTO=validate
    volumes:
      - reports:/app/reports
    depends_on:
      app-1:
        condition: service_healthy
      activemq:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nextcloud_data:/var/www/html:ro
    ports:
      - "80:80"
    depends_on:
      - app-1
      - app-2
      - onlyoffice
      - nextcloud

  nextcloud:
    image: nextcloud:stable-fpm-alpine
    container_name: nextcloud
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=nextcloud_user
      - POSTGRES_PASSWORD=nextcloud
      - POSTGRES_DB=nextcloud
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost nginx
      - OVERWRITEWEBROOT=/cloud
      - OVERWRITECLIURL=http://localhost/cloud
      - OVERWRITEPROTOCOL=http

volumes:
  reports:
  nextcloud_data:
  postgres_data: